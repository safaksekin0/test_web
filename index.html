<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #38bdf8;
      --border: rgba(255,255,255,0.18);
      --ink:    #f0fdfa;
      --muted:  rgba(240,253,250,0.5);
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      min-height: 100dvh; /* mobile safe area */
      background-image: url('images/login.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      position: relative;
      filter: saturate(0.6) hue-rotate(185deg) brightness(0.8);
      padding: 1rem;
    }
 
    /* Restore normal colors for login card */
    .login-wrap {
      filter: saturate(1.6) hue-rotate(-185deg) brightness(1.25);
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }
 
    /* Decorative corner lines — hidden on small screens */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 80px; height: 80px;
      border: 1px solid var(--border);
      pointer-events: none;
      z-index: 1;
    }
    body::before { top: 16px; left: 16px; border-right: none; border-bottom: none; }
    body::after  { bottom: 16px; right: 16px; border-left: none; border-top: none; }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .login-card {
      background: rgba(3, 80, 160, 0.60);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2.25rem 2rem;
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      width: 100%;
    }
 
    .brand-dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-bottom: 1.4rem;
      box-shadow: 0 0 12px var(--accent);
    }
 
    .login-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 6vw, 2.6rem); /* fluid font size */
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 0.4rem;
      color: var(--ink);
    }
 
    .login-card h1 em {
      font-style: italic;
      color: var(--accent);
    }
 
    .login-card .subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
 
    .field-group {
      margin-bottom: 1.1rem;
    }
 
    .field-group label {
      display: block;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }
 
    .field-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #ffffff;
      outline: none;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
      /* prevent iOS zoom on focus — font-size must be ≥16px */
      -webkit-text-size-adjust: 100%;
    }
 
    /* iOS zoom fix: bump font-size on mobile */
    @media (max-width: 480px) {
      .field-group input {
        font-size: 1rem;
      }
    }
 
    .field-group input::placeholder {
      color: rgba(240,253,250,0.3);
      font-size: 0.82rem;
    }
 
    .field-group input:focus {
      border-color: var(--accent);
      background: rgba(56,189,248,0.1);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.2);
      transform: translateY(-1px);
    }
 
    .btn-login {
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.95rem;
      background: var(--accent);
      color: #0c4a6e;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      box-shadow: 0 4px 18px rgba(56,189,248,0.3);
      /* better tap target on mobile */
      min-height: 48px;
    }
 
    .btn-login:hover  { background: #7dd3fc; box-shadow: 0 6px 24px rgba(56,189,248,0.45); }
    .btn-login:active { transform: translateY(1px); }
 
    .error-msg {
      display: none;
      margin-top: 1rem;
      padding: 0.65rem 1rem;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 7px;
      font-size: 0.82rem;
      color: #fca5a5;
      text-align: center;
    }
 
    .error-msg.show { display: block; animation: shake 0.3s ease; }
 
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
 
    /* ── Small phones ── */
    @media (max-width: 400px) {
      .login-card { padding: 2rem 1.4rem 1.75rem; border-radius: 12px; }
      body::before, body::after { display: none; }
    }
 
    /* ── Landscape mobile ── */
    @media (max-height: 500px) and (orientation: landscape) {
      body { align-items: flex-start; padding: 0.75rem 1rem; }
      .login-card { padding: 1.5rem 2rem; }
      .login-card h1 { font-size: 1.6rem; }
      .brand-dot { margin-bottom: 0.8rem; }
      .login-card .subtitle { margin-bottom: 1rem; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand-dot"></div>
      <h1><em></em>Hoşgeldiniz</h1>
      <p class="subtitle"></p>

      <div class="field-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="Kullanıcı adınızı giriniz" autocomplete="username">
      </div>

      <div class="field-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" placeholder="Bugün birşeylere başlamak için güzel bir gün" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') login()">
      </div>

      <button class="btn-login" onclick="login()">Giriş Yap →</button>
      <div class="error-msg" id="error-msg">Yanlış kullanıcı adı veya şifre.</div>
    </div>
  </div>

  <script src="sc1.js"></script>
</body>
</html>
