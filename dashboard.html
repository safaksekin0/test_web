<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #38bdf8;
      --border: rgba(255,255,255,0.16);
      --ink:    #f0fdfa;
      --muted:  rgba(240,253,250,0.5);
      --surface:#0c4a6e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(150deg, #0d9488 0%, #0369a1 55%, #1e3a5f 100%);
      background-attachment: fixed;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      min-height: 100vh;
    }

    /* ────────── HEADER ────────── */
    header {
      padding: 2.4rem 3rem 1.4rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.5s ease both;
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .brand-dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      box-shadow: 0 0 10px var(--accent);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    header h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    header .meta {
      font-size: 0.80rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
    }

	header .meta1 {
    font-family: 'Cinzel', serif;
    font-weight: 400; 
    font-size: 2.5rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted); 
    text-align: center;
    
    text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
    
    display: inline-block;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    padding-bottom: 10px;
	}
	
    /* ────────── WRAPPER ────────── */
    .content {
      padding: 2.5rem 3rem 3rem;
      animation: fadeUp 0.55s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .section-label {
      font-size: 0.80rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.1rem;
      font-family: 'DM Sans', sans-serif;
    }

    /* ────────── SHARED CARD ────────── */
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 18px rgba(0,0,0,0.28);
      background: var(--surface);
      transition: transform 0.26s ease, box-shadow 0.26s ease;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.025);
      box-shadow: 0 14px 36px rgba(0,0,0,0.38), 0 0 0 1.5px var(--accent);
      z-index: 10;
    }

    .card img, .card video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      filter: brightness(0.8) saturate(0.88);
      transition: filter 0.3s ease, transform 0.35s ease;
    }

    .card:hover img, .card:hover video {
      filter: brightness(1.15) saturate(1.12);
      transform: scale(1.06);
    }

    /* ════════════════════════════════════
       TOP SECTION: left grid (7 imgs) + right text panel
       ════════════════════════════════════ */
    .top-section {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
      margin-bottom: 2.5rem;
      align-items: start;
    }

    /* Left: 7-image mosaic grid
       3 columns, rows defined per card with explicit pixel heights
       so no card is banner-wide */
    .mosaic {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 190px 160px 190px;
      gap: 10px;
    }

    /* Row 1: cards 1-3 */
    .mosaic .card:nth-child(1) { grid-column: 1; grid-row: 1; }
    .mosaic .card:nth-child(2) { grid-column: 2 / span 2; grid-row: 1; } /* wide but only 1 row tall */
    .mosaic .card:nth-child(3) { grid-column: 1 / span 2; grid-row: 2; }
    .mosaic .card:nth-child(4) { grid-column: 3; grid-row: 2; }
    /* Row 3 */
    .mosaic .card:nth-child(5) { grid-column: 1; grid-row: 3; }
    .mosaic .card:nth-child(6) { grid-column: 2; grid-row: 3; }
    .mosaic .card:nth-child(7) { grid-column: 3; grid-row: 3; }

    /* Right: text panel */
    .text-panel {
      padding: 1.8rem 1.6rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1rem;
    }

    .text-panel .tp-label {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
    }

    .text-panel p {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.08rem;
      line-height: 1.8;
      color: rgba(240,253,250,0.88);
      font-weight: 300;
    }

    .text-panel .tp-rule {
      width: 36px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ════════════════════════════════════
       VIDEO — centred feature
       ════════════════════════════════════ */
    .video-wrap {
      max-width: 860px;
      margin: 0 auto 2.5rem;
    }

    .video-wrap .card video {
      aspect-ratio: 16/9;
      height: auto;
    }

    /* ════════════════════════════════════
       BOTTOM GRID — 5 images, varied heights
       5 cols: tall | short | tallest | short | tall
       ════════════════════════════════════ */
    .grid-bottom {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .grid-bottom .card {
      height: 200px;
    }

    /* ────────── FOOTER ────────── */
    footer {
      margin: 0 3rem;
      padding: 1.4rem 0;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      font-family: 'DM Sans', sans-serif;
    }

    /* ────────── RESPONSIVE ────────── */
    @media (max-width: 900px) {
      header { padding: 1.8rem 1.5rem 1.2rem; flex-direction: column; gap: 0.4rem; }
      .content { padding: 2rem 1.5rem; }
      .top-section { grid-template-columns: 1fr; }
      .text-panel { align-self: auto; }
      .mosaic {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 160px);
      }
      .mosaic .card { grid-column: span 1 !important; grid-row: span 1 !important; }
      .grid-bottom { grid-template-columns: repeat(3, 1fr); }
      .grid-bottom .card { height: 160px !important; align-self: auto !important; }
      footer { margin: 0 1.5rem; flex-direction: column; gap: 0.3rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1><span class="meta1">Doğum Günün Kutlu Olsun Sevgİlİm</span></h1>
    <span class="meta">Sevİlay & Çağrı</span>
  </header>

  <div class="content">

    <!-- ── TOP SECTION: 7 images + text panel ── -->
    <p class="section-label">Hatıralar</p>
    <div class="top-section">

      <div class="mosaic">
        <div class="card"><img src="images/img1.jpg"  alt="1"></div>
        <div class="card"><img src="images/img2.jpg"  alt="2"></div>
        <div class="card"><img src="images/img3.jpg"  alt="3"></div>
        <div class="card"><img src="images/img4.jpg"  alt="4"></div>
        <div class="card"><img src="images/img5.jpg"  alt="5"></div>
        <div class="card"><img src="images/img6.jpg"  alt="6"></div>
        <div class="card"><img src="images/img7.jpg"  alt="7"></div>
      </div>

      <div class="text-panel">
        <span class="tp-label"></span>
        <div class="tp-rule"></div>
        <p>Sen hayata ne verirsen hayat sana daha güzelini verir. Ben nasıl bir güzellik verdim ki hayat bana seni verdi. İyi ki doğdun sevgilim iyi ki benimlesin nice mutlu yıllarımıza.</p>
      </div>

    </div>

    <!-- ── FEATURED VIDEO ── -->
    <p class="section-label"></p>
    <div class="video-wrap">
      <div class="card">
        <video src="images/Vid.mp4" autoplay muted loop playsinline></video>
      </div>
    </div>

    <!-- ── BOTTOM: 5 images, staggered heights ── -->
    <p class="section-label"></p>
    <div class="grid-bottom">
      <div class="card"><img src="images/img8.jpg"  alt="8"></div>
      <div class="card"><img src="images/img9.jpg"  alt="9"></div>
      <div class="card"><img src="images/img10.jpg" alt="10"></div>
      <div class="card"><img src="images/img11.jpg" alt="11"></div>
      <div class="card"><img src="images/img12.jpg" alt="12"></div>
    </div>

  </div>

  <footer>
    <span>Gallery</span>
    <span>&copy; 2026</span>
  </footer>


  <!-- ── INTRO ANIMATION OVERLAY ── -->
  <div id="intro-overlay"></div>

  <style>
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      bottom: -60px;
      font-size: 22px;
      animation: rise linear forwards;
      will-change: transform, opacity;
    }

    @keyframes rise {
      0%   { transform: translateY(0)   rotate(0deg);   opacity: 1; }
      75%  { opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>

  <script>
  (() => {
    const overlay = document.getElementById('intro-overlay');
    const EMOJIS  = ['🌸','🌺','💙','🌷','💐','🤍','🩵','🌼'];
    const COUNT   = 22;

    for (let i = 0; i < COUNT; i++) {
      const el = document.createElement('span');
      el.className   = 'petal';
      el.textContent = EMOJIS[i % EMOJIS.length];
      el.style.left     = (Math.random() * 100) + 'vw';
      el.style.fontSize = (16 + Math.random() * 20) + 'px';
      el.style.animationDuration  = (3.5 + Math.random() * 2.5) + 's';
      el.style.animationDelay     = (Math.random() * 2) + 's';
      overlay.appendChild(el);
    }

    // Remove overlay entirely after all animations finish
    setTimeout(() => overlay.remove(), 6000);
  })();
  </script>

</body>
</html>
